name: Aggregate KMS All CSV

"on":
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC. Runs every hour at minute 07.
    - cron: "7 * * * *"

concurrency:
  group: aggregate-kms-all
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_PATH_STYLE: ${{ secrets.S3_PATH_STYLE }}
      S3_SIGNATURE_VERSION: ${{ secrets.S3_SIGNATURE_VERSION }}
      PYTHONUNBUFFERED: "1"

      SOURCE_PREFIX_1: "KMS.110(129)/All/"
      SOURCE_PREFIX_2: "KMS.13(85)/All/"
      SOURCE_PREFIX_3: "KMS.210(96)/All/"
      SOURCE_PREFIX_4: "KMS.22(121)/All/"
      OUTPUT_PREFIX: "kms.all(0)/"
      WORK_DIR: "_kms_aggregate_work"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install awscli

      - name: Configure S3 CLI
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_REGION }}
        run: |
          set -euo pipefail

          if [ -z "${S3_BUCKET:-}" ]; then
            echo "S3_BUCKET secret is empty" >&2
            exit 1
          fi

          case "${S3_PATH_STYLE:-}" in
            true|True|TRUE|1|yes|Yes|YES)
              aws configure set default.s3.addressing_style path
              ;;
          esac

          if [ -n "${S3_SIGNATURE_VERSION:-}" ]; then
            aws configure set default.s3.signature_version "${S3_SIGNATURE_VERSION}"
          fi

      - name: Download All hourly CSV files
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_REGION }}
        run: |
          set -euo pipefail

          aws_s3() {
            if [ -n "${S3_ENDPOINT_URL:-}" ]; then
              aws --endpoint-url "${S3_ENDPOINT_URL}" "$@"
            else
              aws "$@"
            fi
          }

          rm -rf "${WORK_DIR}"
          mkdir -p \
            "${WORK_DIR}/input/cell1/All" \
            "${WORK_DIR}/input/cell2/All" \
            "${WORK_DIR}/input/cell3/All" \
            "${WORK_DIR}/input/cell4/All" \
            "${WORK_DIR}/output"

          aws_s3 s3 sync "s3://${S3_BUCKET}/${SOURCE_PREFIX_1}" "${WORK_DIR}/input/cell1/All" --only-show-errors --exclude "*" --include "*.csv" --include "*.CSV"
          aws_s3 s3 sync "s3://${S3_BUCKET}/${SOURCE_PREFIX_2}" "${WORK_DIR}/input/cell2/All" --only-show-errors --exclude "*" --include "*.csv" --include "*.CSV"
          aws_s3 s3 sync "s3://${S3_BUCKET}/${SOURCE_PREFIX_3}" "${WORK_DIR}/input/cell3/All" --only-show-errors --exclude "*" --include "*.csv" --include "*.CSV"
          aws_s3 s3 sync "s3://${S3_BUCKET}/${SOURCE_PREFIX_4}" "${WORK_DIR}/input/cell4/All" --only-show-errors --exclude "*" --include "*.csv" --include "*.CSV"

      - name: Aggregate All hourly CSV files
        run: |
          set -euo pipefail

          if [ ! -f "tools/aggregate_object_csv.py" ]; then
            echo "File tools/aggregate_object_csv.py was not found" >&2
            exit 1
          fi

          python -m py_compile tools/aggregate_object_csv.py

          python - <<'PY'
          from pathlib import Path
          import os
          import re
          import subprocess
          import sys

          work_dir = Path(os.environ["WORK_DIR"])
          input_dirs = [
              work_dir / "input" / "cell1",
              work_dir / "input" / "cell2",
              work_dir / "input" / "cell3",
              work_dir / "input" / "cell4",
          ]
          output_dir = work_dir / "output"
          output_dir.mkdir(parents=True, exist_ok=True)

          hourly_all_re = re.compile(
              r"^All/\d{4}\.\d{2}\.\d{2}/All-\d{4}\.\d{2}\.\d{2}-\d{2}\.00\.csv$",
              re.IGNORECASE,
          )

          rel_paths: set[Path] = set()
          ignored = 0

          for input_dir in input_dirs:
              all_dir = input_dir / "All"
              if not all_dir.exists():
                  continue

              for path in all_dir.rglob("*"):
                  if not path.is_file() or path.suffix.lower() != ".csv":
                      continue

                  rel_path = path.relative_to(input_dir)
                  rel_posix = rel_path.as_posix()

                  if hourly_all_re.match(rel_posix):
                      rel_paths.add(rel_path)
                  else:
                      ignored += 1
                      print(f"IGNORE non-hourly-All CSV: {rel_posix}")

          if not rel_paths:
              raise SystemExit("No hourly All CSV files found in source folders")

          aggregated = 0
          skipped = 0

          for rel_path in sorted(rel_paths):
              sources = [input_dir / rel_path for input_dir in input_dirs]
              missing = [str(path) for path in sources if not path.exists()]
              if missing:
                  skipped += 1
                  print(f"SKIP: {rel_path.as_posix()} is not present in all 4 source folders")
                  for path in missing:
                      print(f"  missing: {path}")
                  continue

              out_path = output_dir / rel_path
              out_path.parent.mkdir(parents=True, exist_ok=True)

              cmd = [
                  sys.executable,
                  "tools/aggregate_object_csv.py",
                  "--out",
                  str(out_path),
                  *(str(path) for path in sources),
              ]
              subprocess.run(cmd, check=True)
              aggregated += 1

          print(f"Aggregated hourly All CSV files: {aggregated}")
          print(f"Skipped incomplete hourly All file groups: {skipped}")
          print(f"Ignored non-hourly-All CSV files: {ignored}")

          if aggregated == 0:
              raise SystemExit("No complete 4-file hourly All CSV groups were aggregated")
          PY

      - name: Upload aggregated All CSV files
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_REGION }}
        run: |
          set -euo pipefail

          aws_s3() {
            if [ -n "${S3_ENDPOINT_URL:-}" ]; then
              aws --endpoint-url "${S3_ENDPOINT_URL}" "$@"
            else
              aws "$@"
            fi
          }

          if [ ! -d "${WORK_DIR}/output/All" ]; then
            echo "No output All directory found: ${WORK_DIR}/output/All" >&2
            exit 1
          fi

          aws_s3 s3 sync "${WORK_DIR}/output/All" "s3://${S3_BUCKET}/${OUTPUT_PREFIX}All/" --only-show-errors --exclude "*" --include "*.csv" --include "*.CSV"
