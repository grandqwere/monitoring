name: Aggregate KMS All CSV (hourly)

"on":
  workflow_dispatch:
    inputs:
      rebuild_mode:
        description: "What to aggregate"
        required: true
        default: "missing_only"
        type: choice
        options:
          - "missing_only"
          - "missing_or_source_newer"
          - "all_complete"
      max_files:
        description: "Maximum files to aggregate in one run, 0 = no limit"
        required: true
        default: "0"
  schedule:
    # GitHub Actions cron is UTC. Runs every hour at minute 05.
    - cron: "5 * * * *"

concurrency:
  group: aggregate-kms-all
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_PATH_STYLE: ${{ secrets.S3_PATH_STYLE }}
      S3_SIGNATURE_VERSION: ${{ secrets.S3_SIGNATURE_VERSION }}
      PYTHONUNBUFFERED: "1"

      SOURCE_PREFIX_1: "KMS.110(129)/All/"
      SOURCE_PREFIX_2: "KMS.13(85)/All/"
      SOURCE_PREFIX_3: "KMS.210(96)/All/"
      SOURCE_PREFIX_4: "KMS.22(121)/All/"
      OUTPUT_PREFIX: "kms.all(0)/All/"
      RECOVERY_REPORT_KEY: "kms.all(0)/recovery.txt"
      WORK_DIR: "_kms_aggregate_work"

      # Schedule uses default values. Manual run may override them.
      REBUILD_MODE: ${{ github.event.inputs.rebuild_mode || 'missing_only' }}
      MAX_FILES: ${{ github.event.inputs.max_files || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install awscli

      - name: Configure S3 CLI
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_REGION }}
        run: |
          set -euo pipefail

          if [ -z "${S3_BUCKET:-}" ]; then
            echo "S3_BUCKET secret is empty" >&2
            exit 1
          fi

          case "${S3_PATH_STYLE:-}" in
            true|True|TRUE|1|yes|Yes|YES)
              aws configure set default.s3.addressing_style path
              ;;
          esac

          if [ -n "${S3_SIGNATURE_VERSION:-}" ]; then
            aws configure set default.s3.signature_version "${S3_SIGNATURE_VERSION}"
          fi

      - name: Aggregate missing All hourly CSV files
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_REGION }}
        run: |
          set -euo pipefail

          if [ ! -f "tools/aggregate_object_csv.py" ]; then
            echo "File tools/aggregate_object_csv.py was not found" >&2
            exit 1
          fi

          python -m py_compile tools/aggregate_object_csv.py

          rm -rf "${WORK_DIR}"
          mkdir -p "${WORK_DIR}/input" "${WORK_DIR}/output"

          python - <<'PY'
          from __future__ import annotations

          from datetime import datetime
          from pathlib import Path
          import json
          import os
          import re
          import subprocess
          import sys

          bucket = os.environ["S3_BUCKET"]
          endpoint_url = os.environ.get("S3_ENDPOINT_URL", "")
          work_dir = Path(os.environ["WORK_DIR"])
          rebuild_mode = os.environ.get("REBUILD_MODE", "missing_only")
          max_files = int(os.environ.get("MAX_FILES", "0"))

          source_prefixes = [
              os.environ["SOURCE_PREFIX_1"],
              os.environ["SOURCE_PREFIX_2"],
              os.environ["SOURCE_PREFIX_3"],
              os.environ["SOURCE_PREFIX_4"],
          ]
          output_prefix = os.environ["OUTPUT_PREFIX"]
          recovery_report_key = os.environ.get(
              "RECOVERY_REPORT_KEY",
              "kms.all(0)/recovery.txt",
          ).lstrip("/")

          hourly_re = re.compile(
              r"^\d{4}\.\d{2}\.\d{2}/All-\d{4}\.\d{2}\.\d{2}-\d{2}\.00\.csv$",
              re.IGNORECASE,
          )

          if rebuild_mode not in {"missing_only", "missing_or_source_newer", "all_complete"}:
              raise SystemExit(f"Unsupported REBUILD_MODE: {rebuild_mode}")

          def norm_prefix(prefix: str) -> str:
              return prefix if prefix.endswith("/") else prefix + "/"

          source_prefixes = [norm_prefix(p) for p in source_prefixes]
          output_prefix = norm_prefix(output_prefix)

          def aws_base() -> list[str]:
              cmd = ["aws"]
              if endpoint_url:
                  cmd += ["--endpoint-url", endpoint_url]
              return cmd

          def aws_run(*args: str) -> None:
              subprocess.run(aws_base() + list(args), check=True)

          def aws_json(*args: str) -> dict:
              result = subprocess.run(
                  aws_base() + list(args),
                  check=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )
              return json.loads(result.stdout or "{}")

          def parse_dt(value: str) -> datetime:
              # AWS returns ISO datetime, usually like 2026-07-03T20:00:10+00:00
              return datetime.fromisoformat(value.replace("Z", "+00:00"))

          def object_exists(key: str) -> bool:
              """Проверить наличие объекта с точным ключом в S3."""
              data = aws_json(
                  "s3api",
                  "list-objects-v2",
                  "--bucket",
                  bucket,
                  "--prefix",
                  key,
                  "--max-keys",
                  "10",
                  "--output",
                  "json",
              )
              return any(obj.get("Key") == key for obj in data.get("Contents", []))

          def load_recovery_report(path: Path) -> tuple[list[str], set[str]]:
              """Загрузить существующий отчёт, сохранив порядок уникальных строк."""
              lines: list[str] = []
              known_lines: set[str] = set()

              if not object_exists(recovery_report_key):
                  print(f"Recovery report does not exist yet: {recovery_report_key}")
                  return lines, known_lines

              aws_run(
                  "s3",
                  "cp",
                  f"s3://{bucket}/{recovery_report_key}",
                  str(path),
                  "--only-show-errors",
              )

              try:
                  existing_text = path.read_text(encoding="utf-8-sig")
              except UnicodeError as exc:
                  raise RuntimeError(
                      f"Recovery report is not valid UTF-8: {recovery_report_key}"
                  ) from exc

              for raw_line in existing_text.splitlines():
                  line = raw_line.strip()
                  if not line or line in known_lines:
                      continue
                  lines.append(line)
                  known_lines.add(line)

              print(f"Loaded recovery report lines: {len(lines)}")
              return lines, known_lines

          def upload_recovery_report(path: Path, lines: list[str]) -> None:
              """Атомарно обновить локальный отчёт и загрузить его в S3."""
              temporary_path = path.with_suffix(path.suffix + ".tmp")
              with temporary_path.open("w", encoding="utf-8-sig", newline="\n") as report:
                  for line in lines:
                      report.write(line + "\n")
              temporary_path.replace(path)

              aws_run(
                  "s3",
                  "cp",
                  str(path),
                  f"s3://{bucket}/{recovery_report_key}",
                  "--only-show-errors",
              )
              print(
                  f"Recovery report uploaded: {recovery_report_key} "
                  f"({len(lines)} unique lines)"
              )

          def read_recovery_statistics(path: Path) -> tuple[list[list[str]], list[int]]:
              """Прочитать статистику восстановленных фаз и пропусков по источникам."""
              try:
                  stats = json.loads(path.read_text(encoding="utf-8"))
              except (OSError, UnicodeError, json.JSONDecodeError) as exc:
                  raise RuntimeError(f"Cannot read recovery statistics: {path}") from exc

              recovery_enabled = stats.get("recovery_enabled")
              if not isinstance(recovery_enabled, bool):
                  raise RuntimeError(
                      "Recovery statistics field 'recovery_enabled' must be boolean"
                  )

              file_stats = stats.get("files")
              if not isinstance(file_stats, list) or len(file_stats) != len(source_prefixes):
                  raise RuntimeError(
                      "Recovery statistics must contain one entry for each source file"
                  )

              recovered_phases: list[list[str]] = []
              missing_data_rows: list[int] = []
              for index, item in enumerate(file_stats, start=1):
                  if not isinstance(item, dict) or not isinstance(item.get("recovered"), dict):
                      raise RuntimeError(
                          f"Invalid recovery statistics for source {index}"
                      )

                  phases: list[str] = []
                  for phase in ("L1", "L2", "L3"):
                      count = item["recovered"].get(phase)
                      if isinstance(count, bool) or not isinstance(count, int) or count < 0:
                          raise RuntimeError(
                              f"Invalid recovery count for source {index}, phase {phase}"
                          )
                      if recovery_enabled and count > 0:
                          phases.append(phase)
                  recovered_phases.append(phases)

                  missing_count = item.get("missing_data_rows")
                  if (
                      isinstance(missing_count, bool)
                      or not isinstance(missing_count, int)
                      or missing_count < 0
                  ):
                      raise RuntimeError(
                          f"Invalid missing data row count for source {index}"
                      )
                  missing_data_rows.append(missing_count)

              return recovered_phases, missing_data_rows

          def list_hourly(prefix: str) -> dict[str, dict]:
              items: dict[str, dict] = {}
              token: str | None = None

              while True:
                  args = [
                      "s3api",
                      "list-objects-v2",
                      "--bucket",
                      bucket,
                      "--prefix",
                      prefix,
                      "--output",
                      "json",
                  ]
                  if token:
                      args += ["--continuation-token", token]

                  data = aws_json(*args)

                  for obj in data.get("Contents", []):
                      key = obj.get("Key", "")
                      if not key.startswith(prefix):
                          continue

                      rel = key[len(prefix):]
                      if not hourly_re.match(rel):
                          continue

                      items[rel] = {
                          "key": key,
                          "last_modified": parse_dt(obj["LastModified"]),
                          "size": int(obj.get("Size", 0)),
                      }

                  if not data.get("IsTruncated"):
                      break
                  token = data.get("NextContinuationToken")
                  if not token:
                      break

              return items

          print(f"Mode: {rebuild_mode}")
          print(f"Max files per run: {max_files if max_files else 'no limit'}")

          source_maps = []
          for index, prefix in enumerate(source_prefixes, start=1):
              items = list_hourly(prefix)
              source_maps.append(items)
              print(f"Source {index}: {prefix} -> hourly All CSV files: {len(items)}")

          output_map = list_hourly(output_prefix)
          print(f"Output: {output_prefix} -> hourly All CSV files: {len(output_map)}")

          if not source_maps or any(not m for m in source_maps):
              raise SystemExit("At least one source folder has no hourly All CSV files")

          common = set(source_maps[0])
          for items in source_maps[1:]:
              common &= set(items)

          if not common:
              raise SystemExit("No hourly All CSV file exists in all 4 source folders")

          candidates: list[tuple[str, str]] = []
          skipped_existing = 0
          skipped_fresh_output = 0

          for rel in sorted(common):
              src_items = [items[rel] for items in source_maps]
              newest_source = max(item["last_modified"] for item in src_items)

              out_item = output_map.get(rel)
              output_present = bool(out_item and int(out_item.get("size", 0)) > 0)

              if rebuild_mode == "missing_only":
                  if output_present:
                      skipped_existing += 1
                      continue
                  candidates.append((rel, "missing output"))

              elif rebuild_mode == "missing_or_source_newer":
                  if not output_present:
                      candidates.append((rel, "missing output"))
                  elif newest_source > out_item["last_modified"]:
                      candidates.append((rel, "source newer than output"))
                  else:
                      skipped_fresh_output += 1

              elif rebuild_mode == "all_complete":
                  candidates.append((rel, "all_complete mode"))

          if max_files > 0:
              candidates = candidates[:max_files]

          print(f"Complete 4-source hourly groups: {len(common)}")
          print(f"Skipped existing outputs: {skipped_existing}")
          print(f"Skipped fresh outputs: {skipped_fresh_output}")
          print(f"Files selected for aggregation: {len(candidates)}")

          if not candidates:
              print("Nothing to aggregate. Exit successfully.")
              raise SystemExit(0)

          recovery_report_path = work_dir / "recovery.txt"
          recovery_report_lines, known_recovery_lines = load_recovery_report(
              recovery_report_path
          )

          aggregated = 0

          for rel, reason in candidates:
              print(f"AGGREGATE: {rel} ({reason})")

              sources: list[Path] = []
              for index, prefix in enumerate(source_prefixes, start=1):
                  src_key = prefix + rel
                  local_path = work_dir / "input" / f"cell{index}" / "All" / rel
                  local_path.parent.mkdir(parents=True, exist_ok=True)

                  aws_run(
                      "s3",
                      "cp",
                      f"s3://{bucket}/{src_key}",
                      str(local_path),
                      "--only-show-errors",
                  )
                  sources.append(local_path)

              out_path = work_dir / "output" / "All" / rel
              out_path.parent.mkdir(parents=True, exist_ok=True)
              stats_path = work_dir / "output" / "recovery_stats.json"
              stats_path.unlink(missing_ok=True)

              cmd = [
                  sys.executable,
                  "tools/aggregate_object_csv.py",
                  "--out",
                  str(out_path),
                  "--stats-out",
                  str(stats_path),
                  *(str(path) for path in sources),
              ]
              subprocess.run(cmd, check=True)
              recovered_phases, missing_data_rows = read_recovery_statistics(stats_path)

              dst_key = output_prefix + rel
              aws_run(
                  "s3",
                  "cp",
                  str(out_path),
                  f"s3://{bucket}/{dst_key}",
                  "--only-show-errors",
              )

              new_report_lines: list[str] = []
              for index, phases in enumerate(recovered_phases):
                  source_key = source_prefixes[index] + rel
                  for phase in phases:
                      report_line = (
                          f"{source_key} — восстановлен ток фазы {phase}"
                      )
                      if report_line in known_recovery_lines:
                          continue
                      recovery_report_lines.append(report_line)
                      known_recovery_lines.add(report_line)
                      new_report_lines.append(report_line)

                  missing_count = missing_data_rows[index]
                  if missing_count > 0:
                      report_line = (
                          f"{source_key} — обнаружены пропуски данных, "
                          f"строк: {missing_count}"
                      )
                      if report_line not in known_recovery_lines:
                          recovery_report_lines.append(report_line)
                          known_recovery_lines.add(report_line)
                          new_report_lines.append(report_line)

              if new_report_lines:
                  print(
                      f"New recovery report lines for {rel}: "
                      f"{len(new_report_lines)}"
                  )
                  upload_recovery_report(
                      recovery_report_path,
                      recovery_report_lines,
                  )
              else:
                  print(f"No new recovery report lines for {rel}")

              aggregated += 1

          print(f"Aggregated and uploaded files: {aggregated}")
          PY
