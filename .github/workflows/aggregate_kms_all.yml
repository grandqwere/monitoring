name: Aggregate KMS All CSV (hourly missing only)

"on":
  workflow_dispatch:
    inputs:
      rebuild_mode:
        description: "What to aggregate"
        required: true
        default: "missing_only"
        type: choice
        options:
          - "missing_only"
          - "missing_or_source_newer"
          - "all_complete"
      max_files:
        description: "Maximum files to aggregate in one run, 0 = no limit"
        required: true
        default: "0"
  schedule:
    # GitHub Actions cron is UTC. Runs every hour at minute 05.
    - cron: "5 * * * *"

concurrency:
  group: aggregate-kms-all
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_PATH_STYLE: ${{ secrets.S3_PATH_STYLE }}
      S3_SIGNATURE_VERSION: ${{ secrets.S3_SIGNATURE_VERSION }}
      PYTHONUNBUFFERED: "1"

      SOURCE_PREFIX_1: "KMS.110(129)/All/"
      SOURCE_PREFIX_2: "KMS.13(85)/All/"
      SOURCE_PREFIX_3: "KMS.210(96)/All/"
      SOURCE_PREFIX_4: "KMS.22(121)/All/"
      OUTPUT_PREFIX: "kms.all(0)/All/"
      WORK_DIR: "_kms_aggregate_work"

      # Schedule uses default values. Manual run may override them.
      REBUILD_MODE: ${{ github.event.inputs.rebuild_mode || 'missing_only' }}
      MAX_FILES: ${{ github.event.inputs.max_files || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install awscli

      - name: Configure S3 CLI
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_REGION }}
        run: |
          set -euo pipefail

          if [ -z "${S3_BUCKET:-}" ]; then
            echo "S3_BUCKET secret is empty" >&2
            exit 1
          fi

          case "${S3_PATH_STYLE:-}" in
            true|True|TRUE|1|yes|Yes|YES)
              aws configure set default.s3.addressing_style path
              ;;
          esac

          if [ -n "${S3_SIGNATURE_VERSION:-}" ]; then
            aws configure set default.s3.signature_version "${S3_SIGNATURE_VERSION}"
          fi

      - name: Aggregate missing All hourly CSV files
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_REGION }}
        run: |
          set -euo pipefail

          if [ ! -f "tools/aggregate_object_csv.py" ]; then
            echo "File tools/aggregate_object_csv.py was not found" >&2
            exit 1
          fi

          python -m py_compile tools/aggregate_object_csv.py

          rm -rf "${WORK_DIR}"
          mkdir -p "${WORK_DIR}/input" "${WORK_DIR}/output"

          python - <<'PY'
          from __future__ import annotations

          from datetime import datetime
          from pathlib import Path
          import json
          import os
          import re
          import subprocess
          import sys

          bucket = os.environ["S3_BUCKET"]
          endpoint_url = os.environ.get("S3_ENDPOINT_URL", "")
          work_dir = Path(os.environ["WORK_DIR"])
          rebuild_mode = os.environ.get("REBUILD_MODE", "missing_only")
          max_files = int(os.environ.get("MAX_FILES", "0"))

          source_prefixes = [
              os.environ["SOURCE_PREFIX_1"],
              os.environ["SOURCE_PREFIX_2"],
              os.environ["SOURCE_PREFIX_3"],
              os.environ["SOURCE_PREFIX_4"],
          ]
          output_prefix = os.environ["OUTPUT_PREFIX"]

          hourly_re = re.compile(
              r"^\d{4}\.\d{2}\.\d{2}/All-\d{4}\.\d{2}\.\d{2}-\d{2}\.00\.csv$",
              re.IGNORECASE,
          )

          if rebuild_mode not in {"missing_only", "missing_or_source_newer", "all_complete"}:
              raise SystemExit(f"Unsupported REBUILD_MODE: {rebuild_mode}")

          def norm_prefix(prefix: str) -> str:
              return prefix if prefix.endswith("/") else prefix + "/"

          source_prefixes = [norm_prefix(p) for p in source_prefixes]
          output_prefix = norm_prefix(output_prefix)

          def aws_base() -> list[str]:
              cmd = ["aws"]
              if endpoint_url:
                  cmd += ["--endpoint-url", endpoint_url]
              return cmd

          def aws_run(*args: str) -> None:
              subprocess.run(aws_base() + list(args), check=True)

          def aws_json(*args: str) -> dict:
              result = subprocess.run(
                  aws_base() + list(args),
                  check=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
              )
              return json.loads(result.stdout or "{}")

          def parse_dt(value: str) -> datetime:
              # AWS returns ISO datetime, usually like 2026-07-03T20:00:10+00:00
              return datetime.fromisoformat(value.replace("Z", "+00:00"))

          def list_hourly(prefix: str) -> dict[str, dict]:
              items: dict[str, dict] = {}
              token: str | None = None

              while True:
                  args = [
                      "s3api",
                      "list-objects-v2",
                      "--bucket",
                      bucket,
                      "--prefix",
                      prefix,
                      "--output",
                      "json",
                  ]
                  if token:
                      args += ["--continuation-token", token]

                  data = aws_json(*args)

                  for obj in data.get("Contents", []):
                      key = obj.get("Key", "")
                      if not key.startswith(prefix):
                          continue

                      rel = key[len(prefix):]
                      if not hourly_re.match(rel):
                          continue

                      items[rel] = {
                          "key": key,
                          "last_modified": parse_dt(obj["LastModified"]),
                          "size": int(obj.get("Size", 0)),
                      }

                  if not data.get("IsTruncated"):
                      break
                  token = data.get("NextContinuationToken")
                  if not token:
                      break

              return items

          print(f"Mode: {rebuild_mode}")
          print(f"Max files per run: {max_files if max_files else 'no limit'}")

          source_maps = []
          for index, prefix in enumerate(source_prefixes, start=1):
              items = list_hourly(prefix)
              source_maps.append(items)
              print(f"Source {index}: {prefix} -> hourly All CSV files: {len(items)}")

          output_map = list_hourly(output_prefix)
          print(f"Output: {output_prefix} -> hourly All CSV files: {len(output_map)}")

          if not source_maps or any(not m for m in source_maps):
              raise SystemExit("At least one source folder has no hourly All CSV files")

          common = set(source_maps[0])
          for items in source_maps[1:]:
              common &= set(items)

          if not common:
              raise SystemExit("No hourly All CSV file exists in all 4 source folders")

          candidates: list[tuple[str, str]] = []
          skipped_existing = 0
          skipped_fresh_output = 0

          for rel in sorted(common):
              src_items = [items[rel] for items in source_maps]
              newest_source = max(item["last_modified"] for item in src_items)

              out_item = output_map.get(rel)
              output_present = bool(out_item and int(out_item.get("size", 0)) > 0)

              if rebuild_mode == "missing_only":
                  if output_present:
                      skipped_existing += 1
                      continue
                  candidates.append((rel, "missing output"))

              elif rebuild_mode == "missing_or_source_newer":
                  if not output_present:
                      candidates.append((rel, "missing output"))
                  elif newest_source > out_item["last_modified"]:
                      candidates.append((rel, "source newer than output"))
                  else:
                      skipped_fresh_output += 1

              elif rebuild_mode == "all_complete":
                  candidates.append((rel, "all_complete mode"))

          if max_files > 0:
              candidates = candidates[:max_files]

          print(f"Complete 4-source hourly groups: {len(common)}")
          print(f"Skipped existing outputs: {skipped_existing}")
          print(f"Skipped fresh outputs: {skipped_fresh_output}")
          print(f"Files selected for aggregation: {len(candidates)}")

          if not candidates:
              print("Nothing to aggregate. Exit successfully.")
              raise SystemExit(0)

          aggregated = 0

          for rel, reason in candidates:
              print(f"AGGREGATE: {rel} ({reason})")

              sources: list[Path] = []
              for index, prefix in enumerate(source_prefixes, start=1):
                  src_key = prefix + rel
                  local_path = work_dir / "input" / f"cell{index}" / "All" / rel
                  local_path.parent.mkdir(parents=True, exist_ok=True)

                  aws_run(
                      "s3",
                      "cp",
                      f"s3://{bucket}/{src_key}",
                      str(local_path),
                      "--only-show-errors",
                  )
                  sources.append(local_path)

              out_path = work_dir / "output" / "All" / rel
              out_path.parent.mkdir(parents=True, exist_ok=True)

              cmd = [
                  sys.executable,
                  "tools/aggregate_object_csv.py",
                  "--out",
                  str(out_path),
                  *(str(path) for path in sources),
              ]
              subprocess.run(cmd, check=True)

              dst_key = output_prefix + rel
              aws_run(
                  "s3",
                  "cp",
                  str(out_path),
                  f"s3://{bucket}/{dst_key}",
                  "--only-show-errors",
              )

              aggregated += 1

          print(f"Aggregated and uploaded files: {aggregated}")
          PY
